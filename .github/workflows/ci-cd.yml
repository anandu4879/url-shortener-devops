name: CI/CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: url-shortener-dev-app

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: flake8 --config=.flake8 src

      - name: Run tests
        run: python -m pytest tests
      

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag from commit SHA
        id: vars
        run: echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.image_tag }} \
            ./app

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.image_tag }}
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore

      - name: Push image
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.image_tag }}

  terraform-plan:
    needs: build-and-push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904233090074:role/url-shortener-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init
      - run: |
          terraform plan \
            -var="image_tag=${{ needs.build-and-push.outputs.image_tag }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/environments/dev/tfplan

  terraform-apply:
    needs: [build-and-push, terraform-plan]
    runs-on: ubuntu-latest
    environment: production-approval
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904233090074:role/url-shortener-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/environments/dev

      - run: terraform init
      - run: terraform apply tfplan

  health-check:
    needs: terraform-apply
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for target group health
        run: |
          for i in $(seq 1 20); do
            STATUS=$(aws elbv2 describe-target-health \
              --target-group-arn ${{ secrets.TARGET_GROUP_ARN }} \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text)
            if [ "$STATUS" == "healthy" ]; then
              echo "Target healthy"
              exit 0
            fi
            echo "Waiting... current state: $STATUS"
            sleep 15
          done
          echo "Deployment did not become healthy in time"
          exit 1
      - name: Wait for target group health
        run: |
          for i in $(seq 1 20); do
            STATUS=$(aws elbv2 describe-target-health \
              --target-group-arn ${{ secrets.TARGET_GROUP_ARN }} \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text)
            if [ "$STATUS" == "healthy" ]; then
              echo "Target healthy"
              exit 0
            fi
            echo "Waiting... current state: $STATUS"
            sleep 15
          done
          echo "Deployment did not become healthy in time"
          exit 1

  rollback:
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - name: Roll back to last known-good tag
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ secrets.LAST_KNOWN_GOOD_TAG }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
            